name: StockAI Daily

on:
  schedule:
    # 月〜金 日本時間 8:30
    # GitHub Actions の cron は UTC
    # JST 8:30 = UTC 23:30
    - cron: "30 23 * * 0-4"

  workflow_dispatch:

jobs:
  stockai:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run StockAI
        run: |
          python run_all.py

      - name: Commit CSV files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add marketdata/*.csv
          git diff --cached --quiet || git commit -m "Update market data"
          git push